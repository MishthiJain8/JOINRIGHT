version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: jointright-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: jointright_prod
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - jointright-network

  # Backend API Server
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: jointright-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/jointright_prod?authSource=admin
      JWT_SECRET: your_super_secure_jwt_secret_key_change_in_production
      JWT_EXPIRE: 24h
      FRONTEND_URL: http://localhost:3000
      FRONTEND_URL_ALT: http://localhost:3001
      MAX_FILE_SIZE: 50mb
      UPLOAD_PATH: ./uploads
      RECORDING_PATH: ./recordings
      STUN_SERVER: stun:stun.l.google.com:19302
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_recordings:/app/recordings
      - backend_logs:/app/logs
    depends_on:
      - mongodb
    networks:
      - jointright-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jointright-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - jointright-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for Session Management (Optional)
  redis:
    image: redis:7.2-alpine
    container_name: jointright-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jointright-network

# Named volumes for persistent data
volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local
  backend_recordings:
    driver: local
  backend_logs:
    driver: local
  redis_data:
    driver: local

# Network configuration
networks:
  jointright-network:
    driver: bridge